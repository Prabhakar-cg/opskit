sonar.projectKey=Prabhakar-cg_opskit
sonar.organization=prabha
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.9, 3.10, 3.11, 3.12, 3.13
sonar.python.coverage.reportPaths=coverage.xml

# Justified rule exclusions (false positives / intentional patterns):
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7
# S1313 — the hardcoded IPs in resolver.py are the IANA DNS root-server anchors; they MUST be
# hardcoded and are public/safe (the rule targets accidental internal-IP leaks).
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e1.resourceKey=**/dns/resolver.py
# S107 — Typer CLI commands are declaratively parametrized; each flag is a parameter, so the
# option-rich `lookup` command legitimately exceeds the limit (also ruff PLR0913-exempt).
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=**/dns/cli.py
# S8495 — the _coerce_* helpers normalize input into variable-length homogeneous tuples; that is
# their purpose, not an inconsistent-record smell.
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S8495
sonar.issue.ignore.multicriteria.e3.resourceKey=**/dns/api.py
# S1192 — the repeated "Iterable[dns.rdata.Rdata]" is a typing.cast() target string; it must stay a
# string literal for mypy/pyright to resolve the forward reference, so it can't become a constant.
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e4.resourceKey=**/dns/resolver.py
# S4423/S4830/S5527 (tls/handshake.py) — REVIEWED SAFE (constitution Art. III; see the
# "Security review" note in src/opskit/tls/handshake.py). opskit is a read-only TLS *inspector*:
# it must complete the handshake to an INVALID-certificate server to report on it (FR-006), so it
# records OpenSSL verify errors instead of aborting and does its own RFC 6125 name matching; it
# sends no application data, and still enforces a TLS 1.2+ floor. Scanners tuned for ordinary
# secure clients flag this inherent inspector design.
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S4423
sonar.issue.ignore.multicriteria.e5.resourceKey=**/tls/handshake.py
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S4830
sonar.issue.ignore.multicriteria.e6.resourceKey=**/tls/handshake.py
sonar.issue.ignore.multicriteria.e7.ruleKey=python:S5527
sonar.issue.ignore.multicriteria.e7.resourceKey=**/tls/handshake.py
