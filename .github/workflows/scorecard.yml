# OpenSSF Scorecard — supply-chain security posture; publishes results and uploads SARIF.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 4 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # required to read the repo (job block overrides the read-all default)
      actions: read        # needed by several Scorecard checks
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          # Add a fine-grained PAT secret SCORECARD_TOKEN (Administration: read) to let
          # Scorecard read branch-protection rules; falls back to the default token otherwise.
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          sarif_file: results.sarif
