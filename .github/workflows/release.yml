# Release — Continuous Delivery.
# release-please maintains a release PR (changelog + version bump from Conventional Commits).
# Merging that PR cuts a tag + GitHub Release; publishing to PyPI then waits for manual approval
# via the protected `pypi` environment and uses Trusted Publishing (OIDC, no tokens).
#
# ONE-TIME SETUP (see docs/PLAN.md):
#   - PyPI Trusted Publisher for this repo + workflow `release.yml` + environment `pypi`
#   - GitHub environment `pypi` with required reviewers (the manual approval gate)
#   - GitHub App for release-please so its PR/commits trigger CI (the default GITHUB_TOKEN
#     does not): create an App with contents:write + pull_requests:write, install it on the
#     repo, then set the `RELEASE_APP_ID` repo variable and `RELEASE_APP_PRIVATE_KEY` secret.
#     Until those exist the workflow falls back to GITHUB_TOKEN (CI won't run on the release PR).
name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      # Mint a short-lived GitHub App token so release-please's PR/commits trigger CI (events
      # from the default GITHUB_TOKEN don't). Skipped until the App is configured, in which case
      # release-please falls back to GITHUB_TOKEN (current behavior — CI won't run on its PR).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Scope the minted token to least privilege (release-please only needs these), even
          # if the App installation grants more.
          permission-contents: write
          permission-pull-requests: write
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi          # protected: requires manual approval before publish
    permissions:
      id-token: write          # OIDC for PyPI Trusted Publishing
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --extra dev
      - name: Final security re-scan (zero-day gate)
        run: uv run pip-audit
      - name: Build
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
