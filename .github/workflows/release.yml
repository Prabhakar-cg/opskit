# Release — Continuous Delivery.
# release-please maintains a release PR (changelog + version bump from Conventional Commits).
# Merging that PR cuts a tag + GitHub Release; publishing to PyPI then waits for manual approval
# via the protected `pypi` environment and uses Trusted Publishing (OIDC, no tokens).
#
# ONE-TIME SETUP required before the first release (see docs/PLAN.md):
#   - PyPI Trusted Publisher for this repo + workflow `release.yml` + environment `pypi`
#   - GitHub environment `pypi` with required reviewers (the manual approval gate)
#   - (recommended) a GitHub App token so full CI re-runs on the release PR; until then
#     release-please uses GITHUB_TOKEN and CI does not run on the release PR.
name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi          # protected: requires manual approval before publish
    permissions:
      id-token: write          # OIDC for PyPI Trusted Publishing
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - run: uv sync --extra dev
      - name: Final security re-scan (zero-day gate)
        run: uv run pip-audit
      - name: Build
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
